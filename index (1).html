<div id="music-btn" onclick="toggleMusic()" title="Toggle Music">MUTE</div>

<div class="container">
    <h1>Veil of Minds</h1>
    <p class="subtitle">Every mind wears a mask.</p>
    <div id="story">
        <p id="story-text">The forest is too quiet tonight. You feel like someone is watching.</p>
        <div id="choices">
            <button onclick="choice1()">Turn around</button>
            <button onclick="choice2()">Keep walking</button>
        </div>
    </div>
    <p id="secret-clue" onclick="revealClue()">.</p>
    <p id="clue-text" class="hidden"></p>
</div>

<script>
function choice1() {
    document.getElementById("story-text").innerText = "You turn around slowly. A shadow stands behind you.";
    document.getElementById("choices").innerHTML =
        '<button onclick="choice3()">Confront it</button><button onclick="choice4()">Run</button>';
}
function choice2() {
    document.getElementById("story-text").innerText = "You keep walking. Footsteps follow your rhythm.";
    document.getElementById("choices").innerHTML =
        '<button onclick="choice5()">Hide behind a tree</button><button onclick="choice6()">Call out</button>';
}
function choice3() {
    document.getElementById("story-text").innerText = "The shadow smiles. It knows your name.";
    document.getElementById("choices").innerHTML = "";
}
function choice4() {
    document.getElementById("story-text").innerText = "You run. But the forest rearranges itself.";
    document.getElementById("choices").innerHTML = "";
}
function choice5() {
    document.getElementById("story-text").innerText = "Something whispers above you.";
    document.getElementById("choices").innerHTML = "";
}
function choice6() {
    document.getElementById("story-text").innerText = "Your voice echoes… but it wasn't your voice.";
    document.getElementById("choices").innerHTML = "";
}
function revealClue() {
    document.getElementById("clue-text").classList.remove("hidden");
    document.getElementById("clue-text").innerText = "Hidden Clue: The demon was never outside. It was always in the narrator.";
}

// MUSIC
let musicPlaying = false;
let musicStarted = false;
const music = document.getElementById('bg-music');
const musicBtn = document.getElementById('music-btn');

function toggleMusic() {
    if (musicPlaying) {
        music.pause();
        musicBtn.textContent = 'MUTE';
        musicPlaying = false;
    } else {
        music.volume = 0.4;
        music.play();
        musicBtn.textContent = 'SOUND';
        musicPlaying = true;
    }
}

document.addEventListener('click', function(e) {
    if (!musicStarted) {
        musicStarted = true;
        music.volume = 0.4;
        music.play().then(() => {
            musicBtn.textContent = 'SOUND';
            musicPlaying = true;
        }).catch((err) => { console.log('Audio error:', err); });
    }
}, true);
</script>
